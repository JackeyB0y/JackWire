<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes"> 
    <title>JackWire</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <div class="player-container">

        <!-- logo -->
        <h1 class="logo-title">JackWire</h1>
        <div class="logo-tagline">Version 1.1.1 - The Playlist Update</div>

        <!-- theme picker -->
        <div class="theme-row">
            THEME
            <div class="theme-dropdown" id="themeDropdown">
                <div class="playlist-dropdown-selected" onclick="toggleThemeDropdown()">
                    <span id="themeLabel">lime</span>
                    <span>▾</span>
                </div>
                <div class="playlist-dropdown-options" id="themeOptions"></div>
            </div>
        </div>

        <!-- currently playing -->
        <div class="now-playing-title" id="nowPlayingTitle">no song selected</div>

        <!-- progress bar -->
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- timestamps -->
        <div class="timestamps">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>

        <!-- buttons -->
        <div class="controls">
            <button id="prevBtn">⏮</button>
            <button id="playBtn">▶</button>
            <button id="nextBtn">⏭</button>
            <button id="shuffleBtn">⇄</button>
            <button id="repeatBtn">↻</button>
        </div>

        <!-- volume -->
        <div class="volume-row">
            VOL
            <input type="range" id="volumeSlider" min="0" max="100" value="75">
            <span id="volumeLabel">75%</span>
        </div>

        <!-- playlist -->
        <div class="theme-row">
            PLAYLISTS
            <div class="playlist-dropdown" id="playlistDropdown">
                <div class="playlist-dropdown-selected" onclick="togglePlaylistDropdown()">
                    <span id="dropdownLabel">all playlists</span>
                    <span>▾</span>
                </div>

                <div class="playlist-dropdown-options" id="playlistOptions"></div>
            </div>
        </div>

        <!-- song list -->
        <div class="song-list" id="songList"></div>
    </div>

    <audio id="audioPlayer"></audio>
    <script src="playlists.js"></script>
    <script src="script.js"></script>
</body>
</html>
